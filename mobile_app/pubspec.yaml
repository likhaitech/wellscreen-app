name: app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.4.1

  flutter_bloc: ^9.1.1
  tflite_flutter: ^0.12.1
  fl_chart: ^1.2.0

  app_usage: ^4.1.0
  usage_stats: ^2.0.1
  flutter_local_notifications: ^22.0.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  get_it: ^9.2.1
  dio: ^5.9.2
  shared_preferences: ^2.5.5

  flutter_map: ^8.3.1
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/wellscreen_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/wellscreen_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/wellscreen_icon.png"
  min_sdk_android: 23